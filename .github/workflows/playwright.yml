name: Playwright Tests

on:
  push:
  schedule:
    # Runs every day at 1:00 AM IST
    - cron: '30 19 * * *'

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 180

    # Credentials are stored in GitHub Secrets — never commit .env to the repo.
    # Required secrets: TEST_EMAIL, TEST_PASSWORD, VENDOR_EMAIL, VENDOR_PASSWORD,
    # NEW_TEST_EMAIL, NEW_TEST_PASSWORD, ONE_ORG_TEST_EMAIL,
    # LOGIN_URL, DASHBOARD_URL, BASE_URL
    env:
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      VENDOR_EMAIL: ${{ secrets.VENDOR_EMAIL }}
      VENDOR_PASSWORD: ${{ secrets.VENDOR_PASSWORD }}
      NEW_TEST_EMAIL: ${{ secrets.NEW_TEST_EMAIL }}
      NEW_TEST_PASSWORD: ${{ secrets.NEW_TEST_PASSWORD }}
      ONE_ORG_TEST_EMAIL: ${{ secrets.ONE_ORG_TEST_EMAIL }}
      LOGIN_URL: ${{ secrets.LOGIN_URL }}
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}
      LOG_LEVEL: debug

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install

      # Run mandatory tests first in serial
      - name: Run @mandatory tests
        run: npx playwright test --grep "@mandatory" --workers=1

      # Run all remaining tests except mandatory
      - name: Run remaining tests
        run: npx playwright test --grep-invert "@mandatory" --workers=4

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/